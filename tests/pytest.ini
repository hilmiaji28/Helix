[pytest]
minversion = 8.0

testpaths =
    tests

python_files =
    test_*.py

python_classes =
    Test*

python_functions =
    test_*

addopts =
    -ra
    --strict-markers
    --strict-config
    --disable-warnings
    --tb=short
    --cov=api
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml

filterwarnings =
    ignore::DeprecationWarning