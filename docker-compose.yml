version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: helix-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      PYTHONPATH: /app/src:/app

    volumes:
      - .:/app

    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: helix-streamlit

    depends_on:
      - api

    command: >
      streamlit run streamlit/Home.py
      --server.port=8501
      --server.address=0.0.0.0

    ports:
      - "8501:8501"

    environment:
      API_URL: http://api:8000
      PYTHONPATH: /app/src:/app

    volumes:
      - .:/app

    restart: unless-stopped