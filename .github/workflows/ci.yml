name: HELIX CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout

        uses: actions/checkout@v4

      - name: Setup Python

        uses: actions/setup-python@v5

        with:
          python-version: "3.12"

      - name: Install dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

          pip install -r requirements-dev.txt

      - name: Ruff

        run: |

          ruff check .

      - name: Black

        run: |

          black . --check

      - name: isort

        run: |

          isort . --check-only

      - name: Run Tests

        run: |

          pytest -v
